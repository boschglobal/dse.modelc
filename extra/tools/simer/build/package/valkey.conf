# Network
protected-mode no
bind 127.0.0.1
port 6379
tcp-backlog 511
unixsocket /var/run/valkey/valkey.sock
unixsocketperm 700
timeout 0
tcp-keepalive 300

# General
daemonize no
pidfile /run/valkey_6379.pid
loglevel notice
logfile ""
databases 1
always-show-logo yes

# Persistence
save ""
dir /data/valkey

# Memory
maxmemory 2gb
maxmemory-policy allkeys-lru
lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no
lazyfree-lazy-user-del no

# I/O
io-threads 4
io-threads-do-reads yes

# Appends
appendonly no

# Events
notify-keyspace-events ""