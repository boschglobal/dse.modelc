---
version: '3'

metadata:
  package:
    download: '{{.REPO}}/releases/download/v{{.TAG}}/ModelC-{{.TAG}}-{{.PLATFORM_ARCH}}.zip'
    file: 'dse/modelc/build/_dist/ModelC-{{coalesce .TAG .PACKAGE_VERSION "not-specified"}}-{{.PLATFORM_ARCH}}.zip'

  container:
    repository: ghcr.io/boschglobal/dse-modelc

  models:
    dse.modelc.csv:
      name: csv
      displayName: dse.modelc.csv
      path: examples/csv
      workflows: []
      platforms:
        - linux-amd64
        - linux-x86
        - linux-i386
        - windows-x64
        - windows-x86
      channels:
        - alias: signal_channel
    dse.modelc.lua:
      name: lua
      displayName: dse.modelc.lua
      mcl: true  # built-in, no path.
      workflows: []
      platforms:
        - linux-amd64
        - linux-x86
        - linux-i386
        - windows-x64
        - windows-x86

vars:
  # When running from E2E tests (i.e. Docker in Docker), the MODELC_SIMDIR (for
  # Docker commands) must be set to the host relative path.
  MODELC_SIMDIR: '{{if .SIM}}{{.ENTRYWORKDIR}}/{{.SIM}}{{else}}{{.PWD}}{{end}}'
  MODELC_OUTDIR: '{{if .OUTDIR}}{{.ENTRYWORKDIR}}/{{.OUT}}{{else}}{{.PWD}}/out{{end}}'
  # Container image specification.
  MODELC_REPO: 'https://github.com/boschglobal/dse.modelc'
  MODELC_REGISTRY: ghcr.io/boschglobal
  MODELC_TAG: '{{.TAG | default "latest"}}'
  USER:
    sh: id -u
  GROUP:
    sh: id -g

tasks:

  info:
    desc: |
      Print general information and operating info for this Taskfile.
    summary: |
      $ OUTDIR=foo SIMDIR=bar task -t Taskfile.yml info
    run: always
    silent: true
    dir: '{{.USER_WORKING_DIR}}'
    label: dse:modelc:info
    vars:
      MODELC_IMAGE: '{{if .MODELC_IMAGE}}{{.MODELC_IMAGE}}{{else}}{{.MODELC_REGISTRY}}/dse-modelc:{{.MODELC_TAG}}{{end}}'
      SIMER_IMAGE: '{{if .SIMER_IMAGE}}{{.SIMER_IMAGE}}{{else}}{{.MODELC_REGISTRY}}/dse-simer:{{.MODELC_TAG}}{{end}}'
    cmds:
      - echo "** Taskfile global vars (MODELC Namespace) **"
      - echo MODELC_SIMDIR={{.MODELC_SIMDIR}}
      - echo MODELC_OUTDIR={{.MODELC_OUTDIR}}
      - echo MODELC_REPO={{.MODELC_REPO}}
      - echo MODELC_REGISTRY={{.MODELC_REGISTRY}}
      - echo MODELC_TAG={{.MODELC_TAG}}
      - echo "** Taskfile Include vars **"
      - echo ENTRYWORKDIR={{.ENTRYWORKDIR}}
      - echo SIM={{.SIM}}
      - echo TAG={{.TAG}}
      - echo "** Runtime/Other vars **"
      - echo MODELC_IMAGE={{.MODELC_IMAGE}}
      - echo SIMER_IMAGE={{.SIMER_IMAGE}}
      - echo PACKAGE_VERSION={{.PACKAGE_VERSION}}
      - echo PLATFORM_ARCH={{.PLATFORM_ARCH}}
      - echo USER_WORKING_DIR={{.USER_WORKING_DIR}}

  download-file:
    internal: true
    cmds:
      - echo "CURL {{.URL}} -> {{.FILE}}"
      - mkdir -p $(dirname {{.FILE}})
      - curl --retry 5 {{.AUTH}} -fL {{.URL}} -o {{.FILE}}
    dir: '{{.OUTDIR}}'
    label: dse:download-file:{{.URL}}-{{.FILE}}
    run: when_changed
    vars:
      URL: '{{.URL}}'
      FILE: '{{.FILE}}'
      AUTH: '{{if all .USER .TOKEN}}-u {{.USER}}:{{.TOKEN}}{{else}}{{end}}'
    generates:
      - '{{.FILE}}'
    status:
      - test -f {{.FILE}}

  unzip-dir:
    internal: true
    cmds:
      - echo "UNZIP DIR {{.ZIP}}/{{.ZIPDIR}} -> {{.DIR}}"
      - mkdir -p {{.DIR}}
      - unzip -o {{.ZIP}} {{.ZIPDIR}}/* -d {{.DIR}}
    dir: '{{.OUTDIR}}'
    label: dse:unzip-dir:{{.ZIPFILE}}-{{.DIR}}-{{.ZIPDIR}}
    run: when_changed
    vars:
      ZIP: '{{.ZIP}}'
      ZIPDIR: '{{.ZIPDIR}}'
      DIR: '{{.DIR}}'
    sources:
      - '{{.ZIP}}'
    generates:
      - '{{.DIR}}/{{.ZIPDIR}}/**'

  download-simer-windows:
    desc: |
      Download and extract a Simer windows package.
    summary: |
      $ OUTDIR=out SIMDIR=sim task -t Taskfile.yml download-simer-windows
    cmds:
      - echo "DOWNLOAD SIMER WINDOWS {{.PACKAGE_URL}} -> {{.PATH}}"
      - task: unzip-dir
        vars:
          DIR: '{{.PATH}}/bin'
          ZIP: downloads/{{base .PACKAGE_URL}}
          ZIPDIR: 'bin'
      - task: unzip-dir
        vars:
          DIR: '{{.PATH}}/licenses'
          ZIP: downloads/{{base .PACKAGE_URL}}
          ZIPDIR: 'licenses'
    dir: '{{.OUTDIR}}'
    label: dse:modelc:download-simer-windows
    vars:
      REPO: '{{.MODELC_REPO}}'
      TAG: '{{.MODELC_TAG}}'
      PATH: '{{.SIMDIR}}'
      PACKAGE_URL: '{{.MODELC_REPO}}/releases/download/v{{.MODELC_TAG}}/Simer-{{.MODELC_TAG}}-windows.zip'
    deps:
      - task: download-file
        vars:
          URL: '{{.PACKAGE_URL}}'
          FILE: 'downloads/{{base .PACKAGE_URL}}'
    sources: []
    generates:
      - downloads/{{base .PACKAGE_URL}}
      - '{{.PATH}}/bin/**'
      - '{{.PATH}}/licenses/**'

  download-simer-docker:
    desc: |
      Download and package the Simer docker image.
    summary: |
      $ OUTDIR=out SIMDIR=sim TAG=2.3.7 task -t Taskfile.yml download-simer-docker
    cmds:
      - echo "DOWNLOAD SIMER DOCKER {{.SIMER_IMAGE}} -> {{.PATH}}/{{.TAR}}"
      - docker pull {{.SIMER_IMAGE}}
      - docker save -o {{.PATH}}/{{.TAR}} {{.SIMER_IMAGE}}
    dir: '{{.OUTDIR}}'
    label: dse:modelc:download-simer-docker
    vars:
      REPO: '{{.MODELC_REPO}}'
      TAG: '{{.MODELC_TAG}}'
      PATH: '{{.SIMDIR}}/bin'
      TAR: 'simer-{{.TAG}}.tar'
    sources: []
    generates:
      - '{{.PATH}}/{{.TAR}}'

  package-sim:
    run: always
    desc: |
      Package the out/sim folder into a versioned ZIP file.
    summary: |
      $ OUTDIR=out SIMDIR=sim PROJECT=proj VERSION=1.0.0 task -t Taskfile.yml package-sim
    cmds:
      - echo "PACKAGE SIM {{.SIMDIR}} -> {{.PACKAGE_PATH}}"
      - rm -f {{.PACKAGE_PATH}}
      - zip -r {{.PACKAGE_PATH}} {{.SIMDIR}}
    dir: '{{.OUTDIR}}'
    label: dse:modelc:package-sim
    vars:
      REPO: '{{.MODELC_REPO}}'
      TAG: '{{.MODELC_TAG}}'
      PATH: '{{.SIMDIR}}'
      PACKAGE_PATH: '{{.PROJECT}}-{{.VERSION}}-sim-windows.zip'
    sources: []
    generates:
      - '{{.PACKAGE_PATH}}'
