---
kind: Stack
metadata:
  name: stack
spec:
  connection:
    transport:
      redis:
        uri: redis://localhost:6379
        timeout: 60
  models:
    - name: simbus
      model:
        name: simbus
      channels:
        - name: scalar
          expectedModelCount: 1
        - name: network
          expectedModelCount: 1
    - name: pdunet_inst
      model:
        name: CanNet
      uid: 42
      runtime:
        mcl: lua
        files:
          - model/pdunet_inst/data/network.yaml
          - model/pdunet_inst/model.lua
      channels:
        - name: scalar
          alias: scalar_vector
          selectors:
            channel: scalar_vector
            model: pdunet_inst
        - name: network
          alias: network_vector
          selectors:
            channel: network_vector
            model: pdunet_inst
---
kind: SignalGroup
metadata:
  name: scalar_vector
  labels:
    channel: scalar_vector
    model: pdunet_inst
spec:
  signals:
    - signal: Alive
    - signal: AliveRx
    - signal: FOO
    - signal: BAR
---
kind: SignalGroup
metadata:
  name: network_vector
  labels:
    channel: network_vector
    model: pdunet_inst
  annotations:
    vector_type: binary
spec:
  signals:
    - signal: CAN_A
      annotations:
        mime_type: application/x-automotive-bus; interface=stream; type=pdu; schema=fbs; swc_id=0; ecu_id=1
        pdunet: can  # selector = signal + pdunet
        channel: scalar_vector  # selector = model + channel
