---
kind: Network
metadata:
  name: CAN_A
  labels:
    signal: CAN_A
    pdunet: can
spec:
  schedule:
    epoch_offset: 0.000
  pdus:
    - pdu: LPDU-TX
      id: 0x300
      length: 36
      dir: Tx
      container:
        header: Short
      schedule:
        phase: 0.000
        interval: 0.010
      metadata:
        can:
          frame_format: Base
          frame_type: Data
    - pdu: IPDU-TX-1
      id: 0x301
      length: 8
      dir: Tx
      container:
        id: 0x300
      schedule:
        phase: 0.000
        interval: 0.010
        trigger: Periodic
      signals:
        - signal: C300_10ms_1
          encoding:
            start: 0
            length: 8
            factor: 1
            offset: 0
    - pdu: IPDU-TX-2
      id: 0x302
      length: 8
      dir: Tx
      container:
        id: 0x300
      schedule:
        phase: 0.000
        interval: 0.010
        trigger: Periodic
      signals:
        - signal: C300_10ms_2
          encoding:
            start: 0
            length: 8
            factor: 1
            offset: 0
    - pdu: IPDU-TX-3
      id: 0x303
      length: 8
      dir: Tx
      container:
        id: 0x300
      schedule:
        phase: 0.000
        interval: 0.010
        trigger: Periodic
      signals:
        - signal: C300_10ms_3
          encoding:
            start: 0
            length: 8
            factor: 1
            offset: 0
    - pdu: LPDU-RX
      id: 0x300
      length: 36
      dir: Rx
      container:
        header: Short
      metadata:
        can:
          frame_format: Base
          frame_type: Data
    - pdu: IPDU-RX-1
      id: 0x301
      length: 8
      dir: Rx
      container:
        id: 0x300
      signals:
        - signal: C300_10ms_1_Rx
          encoding:
            start: 0
            length: 8
            factor: 1
            offset: 0
    - pdu: IPDU-RX-2
      id: 0x302
      length: 8
      dir: Rx
      container:
        id: 0x300
      signals:
        - signal: C300_10ms_2_Rx
          encoding:
            start: 0
            length: 8
            factor: 1
            offset: 0
    - pdu: IPDU-RX-3
      id: 0x303
      length: 8
      dir: Rx
      container:
        id: 0x300
      signals:
        - signal: C300_10ms_3_Rx
          encoding:
            start: 0
            length: 8
            factor: 1
            offset: 0

    - pdu: LPDU-PERIODIC-TX
      id: 0x310
      length: 8
      dir: Tx
      schedule:
        phase: 0.000
        interval: 0.020
        trigger: Periodic
      metadata:
        can:
          frame_format: Base
          frame_type: Data
      signals:
        - signal: L310_20ms
          encoding:
            start: 0
            length: 8
            factor: 1
            offset: 0
    - pdu: LPDU-PERIODIC-RX
      id: 0x310
      length: 8
      dir: Rx
      metadata:
        can:
          frame_format: Base
          frame_type: Data
      signals:
        - signal: L310_20ms_Rx
          encoding:
            start: 0
            length: 8
            factor: 1
            offset: 0

    - pdu: LPDU-ONCHANGE-TX
      id: 0x320
      length: 8
      dir: Tx
      metadata:
        can:
          frame_format: Base
          frame_type: Data
      signals:
        - signal: L320_OnChange
          encoding:
            start: 0
            length: 8
            factor: 1
            offset: 0
    - pdu: LPDU-ONCHANGE-RX
      id: 0x320
      length: 8
      dir: Rx
      metadata:
        can:
          frame_format: Base
          frame_type: Data
      signals:
        - signal: L320_OnChange_Rx
          encoding:
            start: 0
            length: 8
            factor: 1
            offset: 0
    - pdu: LPDU-NPC-TX
      id: 0x330
      length: 24
      dir: Tx
      container:
        header: Short
      schedule:
        phase: 0.000
        interval: 0.010
      metadata:
        can:
          frame_format: Base
          frame_type: Data
    - pdu: IPDU-NPC-TX-1
      id: 0x331
      length: 8
      dir: Tx
      container:
        id: 0x330
      signals:
        - signal: C330_OnChange_1
          encoding:
            start: 0
            length: 8
            factor: 1
            offset: 0
    - pdu: IPDU-NPC-TX-2
      id: 0x332
      length: 8
      dir: Tx
      container:
        id: 0x330
      signals:
        - signal: C330_OnChange_2
          encoding:
            start: 0
            length: 8
            factor: 1
            offset: 0
    - pdu: LPDU-NPC-RX
      id: 0x330
      length: 24
      dir: Rx
      container:
        header: Short
      metadata:
        can:
          frame_format: Base
          frame_type: Data
    - pdu: IPDU-NPC-RX-1
      id: 0x331
      length: 8
      dir: Rx
      container:
        id: 0x330
      signals:
        - signal: C330_OnChange_1_Rx
          encoding:
            start: 0
            length: 8
            factor: 1
            offset: 0
    - pdu: IPDU-NPC-RX-2
      id: 0x332
      length: 8
      dir: Rx
      container:
        id: 0x330
      signals:
        - signal: C330_OnChange_2_Rx
          encoding:
            start: 0
            length: 8
            factor: 1
            offset: 0
