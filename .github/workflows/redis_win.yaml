---
name: Redis

on:  # yamllint disable-line rule:truthy
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'  # Once a month.

permissions:
  contents: read

jobs:
  redis-server:
    runs-on: ubuntu-latest

    steps:
      - name: Get latest release from redis-windows/redis-windows
        id: get-release
        run: |
          RELEASE_DATA=$(curl -s https://api.github.com/repos/redis-windows/redis-windows/releases/latest)
          DOWNLOAD_URL=$(echo "$RELEASE_DATA" | jq -r '.assets[] | select(.name | test("Redis-.*-Windows-x64-cygwin\\.zip")) | .browser_download_url')
          echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT

      - name: Download Redis Windows zip
        run: |
          curl -L -o redis-windows.zip "${{ steps.get-release.outputs.download_url }}"

      - name: Extract redis-server.exe
        run: |
          unzip redis-windows.zip "*/redis-server.exe" || unzip redis-windows.zip "redis-server.exe"
          find . -name "redis-server.exe" -exec mv {} . \;
          ls -la redis-server.exe

      - name: Upload redis-server.exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: redis-server-windows
          path: redis-server.exe
          retention-days: 90  # Adjust as needed
          if-no-files-found: error
