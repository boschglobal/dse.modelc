---
name: "CodeQL Advanced"

on:  # yamllint disable-line rule:truthy
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: '22 19 * * 1'

jobs:
  analyze-actions:
    name: Analyze (actions)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: actions
          build-mode: none
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:actions"

  analyze-go:
    name: Analyze (go)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: go
          build-mode: autobuild
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:go"

  analyze-c-cpp:
    name: Analyze (c-cpp)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/boschglobal/dse-gcc-builder:latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: c-cpp
          build-mode: manual
      - name: Run manual build steps
        run: |
          make build
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:c-cpp"
